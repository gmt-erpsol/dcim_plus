<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DCIM PLUS - Data Center Infrastructure Management</title>
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #0a0e27;
            overflow: hidden;
        }
        
        /* App Layout */
        .app {
            display: flex;
            height: 100vh;
        }
        
        /* Sidebar */
        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #0f1535 0%, #0a0e27 100%);
            border-right: 1px solid #1a2350;
            overflow-y: auto;
        }
        
        .logo {
            padding: 28px 24px;
            border-bottom: 1px solid #1a2350;
            margin-bottom: 20px;
        }
        
        .logo h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .logo p {
            color: #5a6e8a;
            font-size: 12px;
            margin-top: 8px;
        }
        
        .nav-section {
            padding: 0 16px;
            margin-bottom: 24px;
        }
        
        .nav-section-title {
            color: #5a6e8a;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 0 12px;
            margin-bottom: 12px;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            margin: 4px 0;
            border-radius: 8px;
            color: #8892b0;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .nav-item:hover {
            background: rgba(46, 204, 113, 0.08);
            color: #2ecc71;
        }
        
        .nav-item.active {
            background: rgba(46, 204, 113, 0.12);
            color: #2ecc71;
        }
        
        .nav-item i {
            width: 20px;
            font-size: 16px;
        }
        
        /* Main Content */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* Top Bar */
        .topbar {
            background: rgba(15, 21, 53, 0.95);
            backdrop-filter: blur(10px);
            padding: 16px 32px;
            border-bottom: 1px solid #1a2350;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .page-title {
            color: white;
            font-size: 20px;
            font-weight: 600;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 24px;
            color: #8892b0;
        }
        
        .user-avatar {
            width: 36px;
            height: 36px;
            background: #2ecc71;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        
        /* Content Area */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 24px 32px;
        }
        
        /* Dashboard Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 20px;
            margin-bottom: 32px;
        }
        
        .stat-card {
            background: #0f1535;
            border-radius: 12px;
            padding: 20px;
            border-left: 3px solid;
        }
        
        .stat-card.critical { border-left-color: #e74c3c; }
        .stat-card.warning { border-left-color: #f39c12; }
        .stat-card.success { border-left-color: #2ecc71; }
        .stat-card.info { border-left-color: #3498db; }
        .stat-card.purple { border-left-color: #9b59b6; }
        .stat-card.cyan { border-left-color: #1abc9c; }
        
        .stat-label {
            color: #8892b0;
            font-size: 12px;
            margin-bottom: 8px;
        }
        
        .stat-value {
            color: white;
            font-size: 32px;
            font-weight: 700;
        }
        
        /* Asset Grid */
        .assets-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 32px;
        }
        
        .asset-card {
            background: #0f1535;
            border-radius: 10px;
            padding: 16px;
        }
        
        .asset-title {
            color: #2ecc71;
            font-size: 13px;
            margin-bottom: 8px;
        }
        
        .asset-count {
            color: white;
            font-size: 20px;
            font-weight: 600;
        }
        
        /* Table Styles */
        .data-table {
            background: #0f1535;
            border-radius: 12px;
            overflow: hidden;
            width: 100%;
        }
        
        .data-table th {
            background: #1a2350;
            padding: 12px;
            text-align: left;
            color: white;
        }
        
        .data-table td {
            padding: 12px;
            color: #8892b0;
            border-bottom: 1px solid #1a2350;
        }
        
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .btn-primary {
            background: #2ecc71;
            color: white;
        }
        
        .btn-secondary {
            background: #3498db;
            color: white;
        }
        
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #2ecc71;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="loading">
            <i class="fas fa-spinner fa-pulse"></i> Loading DCIM PLUS...
        </div>
    </div>
    
    <script src="/assets/js/frappe-web.min.js"></script>
    <script>
        // DCIM PLUS - Complete Custom UI
        let currentView = 'dashboard';
        
        // Fetch data from Frappe API
        async function fetchCount(doctype) {
            try {
                const res = await frappe.call('frappe.client.get_count', { doctype });
                return res.message || 0;
            } catch(e) { return 0; }
        }
        
        // Render Dashboard
        async function renderDashboard() {
            const [assets, racks, ups, gens, cracs] = await Promise.all([
                fetchCount('IT Asset'),
                fetchCount('Rack'),
                fetchCount('UPS'),
                fetchCount('Generator'),
                fetchCount('CRAC Unit')
            ]);
            
            const html = `
                <div>
                    <h2 style="color: white; margin-bottom: 24px;">DCIM PLUS | Executive Dashboard</h2>
                    
                    <div class="stats-grid">
                        <div class="stat-card critical">
                            <div class="stat-label">CRITICAL ALERTS</div>
                            <div class="stat-value">0</div>
                        </div>
                        <div class="stat-card warning">
                            <div class="stat-label">OPEN INCIDENTS</div>
                            <div class="stat-value">0</div>
                        </div>
                        <div class="stat-card success">
                            <div class="stat-label">ACTIVE RACKS</div>
                            <div class="stat-value">${racks}</div>
                        </div>
                        <div class="stat-card info">
                            <div class="stat-label">POWER (KW)</div>
                            <div class="stat-value">0</div>
                        </div>
                        <div class="stat-card purple">
                            <div class="stat-label">AVG TEMP</div>
                            <div class="stat-value">22.5°C</div>
                        </div>
                        <div class="stat-card cyan">
                            <div class="stat-label">PUE</div>
                            <div class="stat-value">1.42</div>
                        </div>
                    </div>
                    
                    <div class="assets-grid">
                        <div class="asset-card">
                            <div class="asset-title">🏢 Infrastructure</div>
                            <div class="asset-count">0 DC - ${racks} Racks</div>
                        </div>
                        <div class="asset-card">
                            <div class="asset-title">💻 IT Assets</div>
                            <div class="asset-count">${assets} Assets - 0 Ports</div>
                        </div>
                        <div class="asset-card">
                            <div class="asset-title">⚡ Power Mgmt</div>
                            <div class="asset-count">${ups} UPS - ${gens} Gen</div>
                        </div>
                        <div class="asset-card">
                            <div class="asset-title">❄️ Cooling</div>
                            <div class="asset-count">${cracs} CRAC - 0 Sens</div>
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('content').innerHTML = html;
        }
        
        // Render List View
        async function renderListView(doctype, title) {
            try {
                const res = await frappe.call('frappe.client.get_list', {
                    doctype: doctype,
                    fields: ['name', 'asset_name', 'status'],
                    limit: 50
                });
                
                let rows = '';
                (res.message || []).forEach(item => {
                    rows += `<tr>
                        <td>${item.asset_name || item.name}</td>
                        <td>${item.status || 'Active'}</td>
                        <td><button onclick="viewItem('${doctype}', '${item.name}')" style="background: #2ecc71; color: white; padding: 4px 12px; border: none; border-radius: 4px; cursor: pointer;">View</button></td>
                    </tr>`;
                });
                
                const html = `
                    <div>
                        <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                            <h2 style="color: white;">${title}</h2>
                            <button class="btn btn-primary" onclick="createNew('${doctype}')">+ New ${title}</button>
                        </div>
                        <table class="data-table">
                            <thead><tr><th>Name</th><th>Status</th><th>Action</th></tr></thead>
                            <tbody>${rows || '<tr><td colspan="3" style="text-align: center;">No records found</td></tr>'}</tbody>
                        </table>
                    </div>
                `;
                document.getElementById('content').innerHTML = html;
            } catch(e) {
                console.error(e);
            }
        }
        
        // Navigation
        function navigateTo(view) {
            currentView = view;
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
                if (item.dataset.view === view) item.classList.add('active');
            });
            
            document.getElementById('page-title').innerText = view.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
            
            if (view === 'dashboard') renderDashboard();
            else if (view === 'racks') renderListView('Rack', 'Racks');
            else if (view === 'it-assets') renderListView('IT Asset', 'IT Assets');
            else if (view === 'power') renderListView('UPS', 'Power Management');
            else if (view === 'cooling') renderListView('CRAC Unit', 'Cooling');
        }
        
        function viewItem(doctype, name) {
            window.open(`/app/${doctype.toLowerCase().replace(/ /g, '-')}/${name}`, '_blank');
        }
        
        function createNew(doctype) {
            window.open(`/app/${doctype.toLowerCase().replace(/ /g, '-')}/new`, '_blank');
        }
        
        // Initialize
        async function init() {
            const sidebarHtml = `
                <div class="sidebar">
                    <div class="logo">
                        <h1><i class="fas fa-database"></i> DCIM PLUS</h1>
                        <p>Addis Ababa, Ethiopia</p>
                    </div>
                    <div class="nav-section">
                        <div class="nav-section-title">MAIN</div>
                        <div class="nav-item active" data-view="dashboard"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></div>
                    </div>
                    <div class="nav-section">
                        <div class="nav-section-title">INFRASTRUCTURE</div>
                        <div class="nav-item" data-view="racks"><i class="fas fa-server"></i><span>Racks</span></div>
                    </div>
                    <div class="nav-section">
                        <div class="nav-section-title">ASSETS</div>
                        <div class="nav-item" data-view="it-assets"><i class="fas fa-microchip"></i><span>IT Assets</span></div>
                        <div class="nav-item" data-view="power"><i class="fas fa-bolt"></i><span>Power</span></div>
                        <div class="nav-item" data-view="cooling"><i class="fas fa-snowflake"></i><span>Cooling</span></div>
                    </div>
                </div>
                <div class="main">
                    <div class="topbar">
                        <div class="page-title" id="page-title">Executive Dashboard</div>
                        <div class="user-info">
                            <i class="fas fa-bell"></i>
                            <span>${frappe.session.user || 'Admin'}</span>
                            <div class="user-avatar"><i class="fas fa-user"></i></div>
                        </div>
                    </div>
                    <div class="content" id="content"></div>
                </div>
            `;
            
            document.getElementById('app').innerHTML = sidebarHtml;
            
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', () => navigateTo(item.dataset.view));
            });
            
            await renderDashboard();
        }
        
        // Start
        frappe.ready(() => init());
    </script>
</body>
</html>
