<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DCIM PLUS - Data Center Infrastructure Management</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0e27;
            overflow: hidden;
        }
        
        /* Your Complete Custom Layout */
        .app {
            display: flex;
            height: 100vh;
        }
        
        /* Sidebar - Your Design */
        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #0f1535 0%, #0a0e27 100%);
            border-right: 1px solid #1a2350;
            overflow-y: auto;
        }
        
        .logo {
            padding: 28px 24px;
            border-bottom: 1px solid #1a2350;
            margin-bottom: 20px;
        }
        
        .logo h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .logo p {
            color: #5a6e8a;
            font-size: 12px;
            margin-top: 8px;
        }
        
        .nav-section {
            padding: 0 16px;
            margin-bottom: 24px;
        }
        
        .nav-section-title {
            color: #5a6e8a;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 0 12px;
            margin-bottom: 12px;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            margin: 4px 0;
            border-radius: 8px;
            color: #8892b0;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .nav-item:hover {
            background: rgba(46, 204, 113, 0.08);
            color: #2ecc71;
        }
        
        .nav-item.active {
            background: rgba(46, 204, 113, 0.12);
            color: #2ecc71;
        }
        
        .nav-item i {
            width: 20px;
            font-size: 16px;
        }
        
        /* Main Content */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* Top Bar - Your Design */
        .topbar {
            background: rgba(15, 21, 53, 0.95);
            backdrop-filter: blur(10px);
            padding: 16px 32px;
            border-bottom: 1px solid #1a2350;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .page-title {
            color: white;
            font-size: 20px;
            font-weight: 600;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 24px;
            color: #8892b0;
        }
        
        .user-avatar {
            width: 36px;
            height: 36px;
            background: #2ecc71;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        
        /* Content Area - Where YOUR custom views go */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 24px 32px;
        }
        
        /* Your Dashboard Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 20px;
            margin-bottom: 32px;
        }
        
        .stat-card {
            background: #0f1535;
            border-radius: 12px;
            padding: 20px;
            border-left: 3px solid;
        }
        
        .stat-card.critical { border-left-color: #e74c3c; }
        .stat-card.warning { border-left-color: #f39c12; }
        .stat-card.success { border-left-color: #2ecc71; }
        .stat-card.info { border-left-color: #3498db; }
        .stat-card.purple { border-left-color: #9b59b6; }
        .stat-card.cyan { border-left-color: #1abc9c; }
        
        .stat-label {
            color: #8892b0;
            font-size: 12px;
            margin-bottom: 8px;
        }
        
        .stat-value {
            color: white;
            font-size: 32px;
            font-weight: 700;
        }
        
        /* Asset Summary Grid */
        .assets-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 32px;
        }
        
        .asset-card {
            background: #0f1535;
            border-radius: 10px;
            padding: 16px;
        }
        
        .asset-title {
            color: #2ecc71;
            font-size: 13px;
            margin-bottom: 8px;
        }
        
        .asset-count {
            color: white;
            font-size: 20px;
            font-weight: 600;
        }
        
        /* Loading */
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #2ecc71;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="loading">
            <i class="fas fa-spinner fa-pulse"></i> Loading DCIM PLUS...
        </div>
    </div>
    
    <script src="/assets/js/frappe-web.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <script>
        // DCIM PLUS - Complete Custom UI (Frappe as Headless Backend Only)
        let currentUser = null;
        
        // Navigation Configuration
        const views = {
            dashboard: { title: 'Executive Dashboard', type: 'dashboard' },
            'data-centers': { title: 'Data Centers', type: 'list', doctype: 'Data Center' },
            'racks': { title: 'Racks', type: 'list', doctype: 'Rack' },
            'it-assets': { title: 'IT Assets', type: 'list', doctype: 'IT Asset' },
            'power': { title: 'Power Management', type: 'list', doctype: 'UPS' },
            'cooling': { title: 'Cooling', type: 'list', doctype: 'CRAC Unit' }
        };
        
        // Get current user
        async function getUser() {
            try {
                const res = await frappe.call('frappe.client.get_value', {
                    doctype: 'User',
                    filters: { name: frappe.session.user },
                    fieldname: ['full_name', 'email', 'user_image']
                });
                if (res.message) {
                    currentUser = res.message;
                    document.querySelector('.user-name').textContent = currentUser.full_name || frappe.session.user;
                }
            } catch(e) { console.error(e); }
        }
        
        // Fetch data from Frappe API
        async function fetchCount(doctype) {
            try {
                const res = await frappe.call('frappe.client.get_count', { doctype });
                return res.message || 0;
            } catch(e) { return 0; }
        }
        
        // Render Dashboard (100% your design)
        async function renderDashboard() {
            // Fetch real data from Frappe backend
            const [assets, racks, ups, gens, cracs, pdus] = await Promise.all([
                fetchCount('IT Asset'),
                fetchCount('Rack'),
                fetchCount('UPS'),
                fetchCount('Generator'),
                fetchCount('CRAC Unit'),
                fetchCount('PDU')
            ]);
            
            const html = `
                <div>
                    <h2 style="color: white; margin-bottom: 24px; font-weight: 600;">DCIM PLUS | Executive Dashboard</h2>
                    
                    <!-- Stats Cards -->
                    <div class="stats-grid">
                        <div class="stat-card critical">
                            <div class="stat-label">CRITICAL ALERTS</div>
                            <div class="stat-value">0</div>
                        </div>
                        <div class="stat-card warning">
                            <div class="stat-label">OPEN INCIDENTS</div>
                            <div class="stat-value">0</div>
                        </div>
                        <div class="stat-card success">
                            <div class="stat-label">ACTIVE RACKS</div>
                            <div class="stat-value">${racks}</div>
                        </div>
                        <div class="stat-card info">
                            <div class="stat-label">POWER (KW)</div>
                            <div class="stat-value">0</div>
                        </div>
                        <div class="stat-card purple">
                            <div class="stat-label">AVG TEMP</div>
                            <div class="stat-value">22.5°C</div>
                        </div>
                        <div class="stat-card cyan">
                            <div class="stat-label">PUE</div>
                            <div class="stat-value">1.42</div>
                        </div>
                    </div>
                    
                    <!-- Asset Summary -->
                    <div class="assets-grid">
                        <div class="asset-card">
                            <div class="asset-title">🏢 Infrastructure</div>
                            <div class="asset-count">0 DC - ${racks} Racks</div>
                        </div>
                        <div class="asset-card">
                            <div class="asset-title">💻 IT Assets</div>
                            <div class="asset-count">${assets} Assets - 0 Ports</div>
                        </div>
                        <div class="asset-card">
                            <div class="asset-title">⚡ Power Mgmt</div>
                            <div class="asset-count">${ups} UPS - ${gens} Gen</div>
                        </div>
                        <div class="asset-card">
                            <div class="asset-title">❄️ Cooling</div>
                            <div class="asset-count">${cracs} CRAC - 0 Sens</div>
                        </div>
                        <div class="asset-card">
                            <div class="asset-title">🔒 Security</div>
                            <div class="asset-count">0 Cam - 0 Fire</div>
                        </div>
                        <div class="asset-card">
                            <div class="asset-title">📋 Operations</div>
                            <div class="asset-count">0 Inc - 0 WO</div>
                        </div>
                        <div class="asset-card">
                            <div class="asset-title">📊 Compliance</div>
                            <div class="asset-count">0 Vis - 0 Shift</div>
                        </div>
                        <div class="asset-card">
                            <div class="asset-title">🤝 Vendor/Audit</div>
                            <div class="asset-count">0 Ven - 0 Con</div>
                        </div>
                    </div>
                    
                    <!-- Quick Actions -->
                    <div style="background: #0f1535; border-radius: 12px; padding: 20px;">
                        <h3 style="color: white; margin-bottom: 16px;">Quick Actions</h3>
                        <div style="display: flex; gap: 12px;">
                            <button onclick="navigateTo('it-assets')" style="background: #2ecc71; color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer;">View Assets</button>
                            <button onclick="navigateTo('racks')" style="background: #3498db; color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer;">View Racks</button>
                            <button onclick="createNewAsset()" style="background: #e74c3c; color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer;">New Asset</button>
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('app').innerHTML = html;
        }
        
        // Render Custom List View (Your design, not Frappe's)
        async function renderListView(doctype, title) {
            try {
                const res = await frappe.call('frappe.client.get_list', {
                    doctype: doctype,
                    fields: ['name', 'asset_name', 'status', 'rack'],
                    limit: 50
                });
                
                const items = res.message || [];
                
                let tableRows = '';
                items.forEach(item => {
                    tableRows += `
                        <tr style="border-bottom: 1px solid #1a2350; cursor: pointer;" onclick="viewItem('${doctype}', '${item.name}')">
                            <td style="padding: 12px; color: white;">${item.asset_name || item.name}</td>
                            <td style="padding: 12px; color: #8892b0;">${item.status || 'Active'}</td>
                            <td style="padding: 12px; color: #8892b0;">${item.rack || '-'}</td>
                        </tr>
                    `;
                });
                
                const html = `
                    <div>
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                            <h2 style="color: white; font-weight: 600;">${title}</h2>
                            <button onclick="createNewRecord('${doctype}')" style="background: #2ecc71; color: white; padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer;">
                                <i class="fas fa-plus"></i> New ${title}
                            </button>
                        </div>
                        
                        <div style="background: #0f1535; border-radius: 12px; overflow: hidden;">
                            <table style="width: 100%; border-collapse: collapse;">
                                <thead style="background: #1a2350;">
                                    <tr>
                                        <th style="padding: 12px; text-align: left; color: white;">Name</th>
                                        <th style="padding: 12px; text-align: left; color: white;">Status</th>
                                        <th style="padding: 12px; text-align: left; color: white;">Rack</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${tableRows || '<tr><td colspan="3" style="padding: 40px; text-align: center; color: #8892b0;">No records found</td></tr>'}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
                
                document.getElementById('app').innerHTML = html;
            } catch(e) {
                console.error(e);
                document.getElementById('app').innerHTML = '<div style="color: white; padding: 40px;">Error loading data</div>';
            }
        }
        
        // Render Custom Form View (Your design)
        async function renderFormView(doctype, docname) {
            try {
                const res = await frappe.call('frappe.client.get', {
                    doctype: doctype,
                    name: docname
                });
                
                const doc = res.message;
                
                let fieldsHtml = '';
                for (let [key, value] of Object.entries(doc)) {
                    if (key.startsWith('_') || key === 'name') continue;
                    if (typeof value === 'object') continue;
                    
                    fieldsHtml += `
                        <div style="margin-bottom: 20px;">
                            <label style="display: block; color: #8892b0; margin-bottom: 8px; font-size: 13px;">${key.replace(/_/g, ' ').toUpperCase()}</label>
                            <input type="text" value="${value || ''}" style="width: 100%; background: #1a2350; border: 1px solid #2a3560; color: white; padding: 10px; border-radius: 6px;">
                        </div>
                    `;
                }
                
                const html = `
                    <div>
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                            <h2 style="color: white; font-weight: 600;">${doc.asset_name || doc.name}</h2>
                            <div>
                                <button onclick="navigateTo('${doctype.toLowerCase().replace(/ /g, '-')}s')" style="background: #6c757d; color: white; padding: 8px 16px; border: none; border-radius: 6px; margin-right: 8px; cursor: pointer;">
                                    <i class="fas fa-arrow-left"></i> Back
                                </button>
                                <button onclick="saveRecord()" style="background: #2ecc71; color: white; padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer;">
                                    Save
                                </button>
                            </div>
                        </div>
                        
                        <div style="background: #0f1535; border-radius: 12px; padding: 24px;">
                            ${fieldsHtml}
                        </div>
                    </div>
                `;
                
                document.getElementById('app').innerHTML = html;
            } catch(e) {
                console.error(e);
            }
        }
        
        // Navigation function
        function navigateTo(view) {
            const config = views[view];
            if (!config) return;
            
            if (config.type === 'dashboard') {
                renderDashboard();
            } else if (config.type === 'list') {
                renderListView(config.doctype, config.title);
            }
            
            // Update active nav
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
                if (item.dataset.view === view) {
                    item.classList.add('active');
                }
            });
        }
        
        function viewItem(doctype, name) {
            renderFormView(doctype, name);
        }
        
        function createNewRecord(doctype) {
            frappe.call('frappe.client.insert', {
                doc: { doctype: doctype, status: 'Active' }
            }).then(res => {
                if (res.message) {
                    navigateTo(doctype.toLowerCase().replace(/ /g, '-') + 's');
                }
            });
        }
        
        function createNewAsset() {
            navigateTo('it-assets');
        }
        
        // Initialize App
        async function init() {
            // Build sidebar and layout
            const sidebarHtml = `
                <div class="sidebar">
                    <div class="logo">
                        <h1><i class="fas fa-database"></i> DCIM PLUS</h1>
                        <p>Addis Ababa, Ethiopia</p>
                    </div>
                    
                    <div class="nav-section">
                        <div class="nav-section-title">MAIN</div>
                        <div class="nav-item active" data-view="dashboard">
                            <i class="fas fa-tachometer-alt"></i>
                            <span>Dashboard</span>
                        </div>
                    </div>
                    
                    <div class="nav-section">
                        <div class="nav-section-title">INFRASTRUCTURE</div>
                        <div class="nav-item" data-view="data-centers">
                            <i class="fas fa-building"></i>
                            <span>Data Centers</span>
                        </div>
                        <div class="nav-item" data-view="racks">
                            <i class="fas fa-server"></i>
                            <span>Racks</span>
                        </div>
                    </div>
                    
                    <div class="nav-section">
                        <div class="nav-section-title">ASSETS</div>
                        <div class="nav-item" data-view="it-assets">
                            <i class="fas fa-microchip"></i>
                            <span>IT Assets</span>
                        </div>
                        <div class="nav-item" data-view="power">
                            <i class="fas fa-bolt"></i>
                            <span>Power Management</span>
                        </div>
                        <div class="nav-item" data-view="cooling">
                            <i class="fas fa-snowflake"></i>
                            <span>Cooling</span>
                        </div>
                    </div>
                </div>
                
                <div class="main">
                    <div class="topbar">
                        <div class="page-title" id="page-title">Executive Dashboard</div>
                        <div class="user-info">
                            <i class="fas fa-bell"></i>
                            <span class="user-name">Loading...</span>
                            <div class="user-avatar">
                                <i class="fas fa-user"></i>
                            </div>
                        </div>
                    </div>
                    <div class="content" id="content">
                        <!-- Dynamic content -->
                    </div>
                </div>
            `;
            
            document.getElementById('app').innerHTML = sidebarHtml;
            
            await getUser();
            await renderDashboard();
            
            // Setup navigation
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', () => {
                    const view = item.dataset.view;
                    if (view) navigateTo(view);
                });
            });
        }
        
        // Expose global functions
        window.navigateTo = navigateTo;
        window.viewItem = viewItem;
        window.createNewRecord = createNewRecord;
        window.createNewAsset = createNewAsset;
        
        // Start
        init();
    </script>
</body>
</html>
