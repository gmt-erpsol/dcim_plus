<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DCIM PLUS - Data Center Infrastructure Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0e27;
            overflow: hidden;
        }
        
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100vh;
            background: linear-gradient(180deg, #0f1535 0%, #0a0e27 100%);
            border-right: 1px solid #1a2350;
            overflow-y: auto;
            z-index: 100;
        }
        
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-track { background: #0a0e27; }
        .sidebar::-webkit-scrollbar-thumb { background: #2ecc71; border-radius: 4px; }
        
        .logo {
            padding: 24px;
            border-bottom: 1px solid #1a2350;
            margin-bottom: 20px;
        }
        
        .logo h1 {
            font-size: 22px;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .logo p {
            color: #5a6e8a;
            font-size: 11px;
            margin-top: 8px;
        }
        
        .nav-section-title {
            padding: 8px 20px;
            color: #5a6e8a;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 20px;
            margin: 2px 12px;
            border-radius: 8px;
            color: #8892b0;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .nav-item:hover {
            background: rgba(46, 204, 113, 0.1);
            color: #2ecc71;
        }
        
        .nav-item.active {
            background: rgba(46, 204, 113, 0.15);
            color: #2ecc71;
        }
        
        .nav-item i { width: 20px; font-size: 14px; }
        
        .main-content {
            margin-left: 280px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .topbar {
            background: rgba(15, 21, 53, 0.95);
            backdrop-filter: blur(10px);
            padding: 16px 24px;
            border-bottom: 1px solid #1a2350;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .page-title {
            color: white;
            font-size: 18px;
            font-weight: 600;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
            color: #8892b0;
        }
        
        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }
        
        /* Dashboard Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: #0f1535;
            border-radius: 12px;
            padding: 20px;
            border-left: 3px solid;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .stat-card:hover { transform: translateY(-2px); }
        .stat-card.critical { border-left-color: #e74c3c; }
        .stat-card.warning { border-left-color: #f39c12; }
        .stat-card.success { border-left-color: #2ecc71; }
        .stat-card.info { border-left-color: #3498db; }
        
        .stat-label { color: #8892b0; font-size: 12px; margin-bottom: 8px; }
        .stat-value { color: white; font-size: 28px; font-weight: 700; }
        
        /* Data Table */
        .data-table {
            background: #0f1535;
            border-radius: 12px;
            overflow: hidden;
            width: 100%;
            margin-top: 20px;
        }
        
        .data-table th {
            background: #1a2350;
            padding: 12px;
            text-align: left;
            color: white;
            font-size: 13px;
        }
        
        .data-table td {
            padding: 12px;
            color: #8892b0;
            border-bottom: 1px solid #1a2350;
            font-size: 13px;
        }
        
        .data-table tr:hover td { background: rgba(46, 204, 113, 0.05); }
        
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }
        
        .btn-primary { background: #2ecc71; color: white; }
        .btn-secondary { background: #3498db; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        
        .loading { text-align: center; padding: 40px; color: #2ecc71; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: #8892b0; margin-bottom: 8px; font-size: 12px; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            background: #1a2350;
            border: 1px solid #2a3560;
            color: white;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">
            <h1><i class="fas fa-database"></i> DCIM PLUS</h1>
            <p>Addis Ababa, Ethiopia</p>
        </div>
        
        <div class="nav-section-title">MAIN</div>
        <div class="nav-item active" data-view="dashboard">
            <i class="fas fa-tachometer-alt"></i> <span>Dashboard</span>
        </div>
        
        <div class="nav-section-title">INFRASTRUCTURE</div>
        <div class="nav-item" data-view="list" data-doctype="Data Center">
            <i class="fas fa-building"></i> <span>Data Centers</span>
        </div>
        <div class="nav-item" data-view="list" data-doctype="Rack">
            <i class="fas fa-server"></i> <span>Racks</span>
        </div>
        
        <div class="nav-section-title">ASSETS</div>
        <div class="nav-item" data-view="list" data-doctype="IT Asset">
            <i class="fas fa-microchip"></i> <span>IT Assets</span>
        </div>
        <div class="nav-item" data-view="list" data-doctype="UPS">
            <i class="fas fa-battery-full"></i> <span>UPS Systems</span>
        </div>
        <div class="nav-item" data-view="list" data-doctype="PDU">
            <i class="fas fa-plug"></i> <span>PDUs</span>
        </div>
        <div class="nav-item" data-view="list" data-doctype="Generator">
            <i class="fas fa-industry"></i> <span>Generators</span>
        </div>
        
        <div class="nav-section-title">COOLING</div>
        <div class="nav-item" data-view="list" data-doctype="CRAC Unit">
            <i class="fas fa-snowflake"></i> <span>CRAC Units</span>
        </div>
        
        <div class="nav-section-title">SECURITY</div>
        <div class="nav-item" data-view="list" data-doctype="Temperature Sensor">
            <i class="fas fa-thermometer-half"></i> <span>Temperature Sensors</span>
        </div>
        
        <div class="nav-section-title">OPERATIONS</div>
        <div class="nav-item" data-view="list" data-doctype="Work Order">
            <i class="fas fa-clipboard-list"></i> <span>Work Orders</span>
        </div>
    </div>
    
    <div class="main-content">
        <div class="topbar">
            <div class="page-title" id="page-title">Executive Dashboard</div>
            <div class="user-info">
                <i class="fas fa-bell"></i>
                <span id="user-name">Admin</span>
                <i class="fas fa-user-circle"></i>
            </div>
        </div>
        <div class="content-area" id="content-area">
            <div class="loading"><i class="fas fa-spinner fa-pulse"></i> Loading...</div>
        </div>
    </div>
    
    <script src="/assets/js/frappe-web.min.js"></script>
    <script>
        let currentDoctype = null;
        
        function fetchCount(doctype) {
            return new Promise((resolve) => {
                if (typeof frappe !== 'undefined' && frappe.call) {
                    frappe.call({
                        method: "frappe.client.get_count",
                        args: { doctype: doctype },
                        callback: (r) => resolve(r.message || 0),
                        error: () => resolve(0)
                    });
                } else { resolve(0); }
            });
        }
        
        async function renderDashboard() {
            const [assets, racks, ups, gens, pdus, cracs] = await Promise.all([
                fetchCount('IT Asset'), fetchCount('Rack'), fetchCount('UPS'),
                fetchCount('Generator'), fetchCount('PDU'), fetchCount('CRAC Unit')
            ]);
            
            const html = `
                <h2 style="color: white; margin-bottom: 20px;">DCIM PLUS | Executive Dashboard</h2>
                <div class="stats-grid">
                    <div class="stat-card success" onclick="loadListView('IT Asset')">
                        <div class="stat-label">IT ASSETS</div>
                        <div class="stat-value">${assets}</div>
                    </div>
                    <div class="stat-card info" onclick="loadListView('Rack')">
                        <div class="stat-label">RACKS</div>
                        <div class="stat-value">${racks}</div>
                    </div>
                    <div class="stat-card warning" onclick="loadListView('UPS')">
                        <div class="stat-label">UPS SYSTEMS</div>
                        <div class="stat-value">${ups}</div>
                    </div>
                    <div class="stat-card critical" onclick="loadListView('PDU')">
                        <div class="stat-label">PDUs</div>
                        <div class="stat-value">${pdus}</div>
                    </div>
                </div>
                <div style="background: #0f1535; border-radius: 12px; padding: 20px;">
                    <h3 style="color: white; margin-bottom: 15px;">Quick Actions</h3>
                    <button class="btn btn-primary" onclick="loadListView('IT Asset')">View Assets</button>
                    <button class="btn btn-secondary" onclick="loadListView('Rack')">View Racks</button>
                    <button class="btn btn-danger" onclick="showNewForm('Work Order')">New Work Order</button>
                </div>
            `;
            document.getElementById('content-area').innerHTML = html;
            document.getElementById('page-title').innerText = 'Executive Dashboard';
        }
        
        async function loadListView(doctype) {
            currentDoctype = doctype;
            document.getElementById('content-area').innerHTML = '<div class="loading"><i class="fas fa-spinner fa-pulse"></i> Loading...</div>';
            
            try {
                const res = await new Promise((resolve) => {
                    frappe.call({
                        method: "frappe.client.get_list",
                        args: { doctype: doctype, fields: ['name', 'status'], limit: 50 },
                        callback: (r) => resolve(r.message || [])
                    });
                });
                
                let rows = '';
                res.forEach(item => {
                    rows += `<tr onclick="loadFormView('${doctype}', '${item.name}')" style="cursor: pointer;">
                        <td>${item.name}</td>
                        <td>${item.status || 'Active'}</td>
                        <td><button class="btn btn-primary" style="padding: 4px 12px;" onclick="event.stopPropagation();loadFormView('${doctype}', '${item.name}')">View</button></td>
                    </tr>`;
                });
                
                const html = `
                    <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                        <h2 style="color: white;">${doctype}s</h2>
                        <button class="btn btn-primary" onclick="showNewForm('${doctype}')">+ New ${doctype}</button>
                    </div>
                    <table class="data-table">
                        <thead><tr><th>Name</th><th>Status</th><th>Action</th></tr></thead>
                        <tbody>${rows || '<tr><td colspan="3" style="text-align: center;">No records found</td></tr>'}</tbody>
                    </table>
                `;
                document.getElementById('content-area').innerHTML = html;
                document.getElementById('page-title').innerText = `${doctype}s`;
            } catch(e) {
                document.getElementById('content-area').innerHTML = '<div class="loading">Error loading data</div>';
            }
        }
        
        async function loadFormView(doctype, docname) {
            document.getElementById('content-area').innerHTML = '<div class="loading"><i class="fas fa-spinner fa-pulse"></i> Loading...</div>';
            
            try {
                const doc = await new Promise((resolve) => {
                    frappe.call({
                        method: "frappe.client.get",
                        args: { doctype: doctype, name: docname },
                        callback: (r) => resolve(r.message || {})
                    });
                });
                
                let fieldsHtml = '';
                for (let [key, value] of Object.entries(doc)) {
                    if (key.startsWith('_') || key === 'name' || typeof value === 'object') continue;
                    fieldsHtml += `
                        <div class="form-group">
                            <label>${key.replace(/_/g, ' ').toUpperCase()}</label>
                            <input type="text" value="${value || ''}" data-field="${key}" id="field_${key}">
                        </div>
                    `;
                }
                
                const html = `
                    <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                        <h2 style="color: white;">${doc.name}</h2>
                        <div>
                            <button class="btn btn-secondary" onclick="loadListView('${doctype}')">Back</button>
                            <button class="btn btn-primary" onclick="saveForm('${doctype}', '${docname}')">Save</button>
                        </div>
                    </div>
                    <div style="background: #0f1535; border-radius: 12px; padding: 24px;">
                        ${fieldsHtml}
                    </div>
                `;
                document.getElementById('content-area').innerHTML = html;
                document.getElementById('page-title').innerText = docname;
            } catch(e) {
                document.getElementById('content-area').innerHTML = '<div class="loading">Error loading form</div>';
            }
        }
        
        function showNewForm(doctype) {
            window.location.href = `/app/${doctype.toLowerCase().replace(/ /g, '-')}/new`;
        }
        
        function saveForm(doctype, docname) {
            // Collect updated fields
            const updatedDoc = { name: docname, doctype: doctype };
            document.querySelectorAll('[data-field]').forEach(input => {
                updatedDoc[input.dataset.field] = input.value;
            });
            
            frappe.call({
                method: "frappe.client.save",
                args: { doc: updatedDoc },
                callback: (r) => {
                    if (r.message) {
                        frappe.msgprint('Saved successfully');
                        loadFormView(doctype, docname);
                    }
                }
            });
        }
        
        function navigateTo(view, doctype = null) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            if (view === 'dashboard') {
                renderDashboard();
                document.querySelector('.nav-item[data-view="dashboard"]').classList.add('active');
            } else if (view === 'list' && doctype) {
                loadListView(doctype);
                const activeItem = document.querySelector(`.nav-item[data-doctype="${doctype}"]`);
                if (activeItem) activeItem.classList.add('active');
            }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof frappe !== 'undefined') {
                frappe.ready(() => {
                    document.getElementById('user-name').innerText = frappe.session.user || 'Admin';
                    renderDashboard();
                });
            } else {
                setTimeout(renderDashboard, 500);
            }
            
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', () => {
                    const view = item.dataset.view;
                    const doctype = item.dataset.doctype;
                    navigateTo(view, doctype);
                });
            });
        });
        
        window.loadListView = loadListView;
        window.loadFormView = loadFormView;
        window.showNewForm = showNewForm;
        window.saveForm = saveForm;
    </script>
</body>
</html>
